# Verdox CI Workflow for hashicorp/consul — Go Tests
# Mirrors go-tests.yml structure for the open-source (CE) test suites.
#
# Each job runs go test -json for its package scope, uploads parsed results,
# then verdox-report collects everything into a single hierarchical payload.
#
# NOTE: This does NOT use consul's reusable workflows (reusable-unit-split.yml etc.)
# since those are designed for the upstream repo. Instead, each job runs
# go test directly with the appropriate directory/flags.

name: "verdox: go-tests"

on:
  workflow_dispatch:
    inputs:
      verdox_run_id:
        description: 'Verdox test run ID'
        required: true
      branch:
        description: 'Branch to test'
        required: true
      commit_hash:
        description: 'Commit hash to test'
        required: true
      callback_url:
        description: 'Webhook callback URL'
        required: false

permissions:
  contents: read

env:
  GOPRIVATE: github.com/hashicorp
  GO_VERSION: "1.25.8"

jobs:

  # ──────────────────────────────────────────────
  # 1. Lint (golangci-lint)
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
        continue-on-error: true

  # ──────────────────────────────────────────────
  # 2. Unit Tests — CE (main module, excluding api/sdk/envoyextensions)
  # ──────────────────────────────────────────────
  go-test-ce:
    name: Unit Tests (CE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: |
          set +e
          go test -json -count=1 -timeout 20m ./... 2>&1 | tee test-output.json
          exit 0
      - name: Parse test results
        if: always()
        run: |
          python3 << 'VERDOX_PARSER'
          import json, sys
          tests = {}
          pkg_durations = {}
          try:
              with open("test-output.json", "r") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      try: ev = json.loads(line)
                      except: continue
                      test = ev.get("Test", "")
                      pkg = ev.get("Package", "")
                      action = ev.get("Action", "")
                      if not test and pkg and action in ("pass", "fail"):
                          pkg_durations[pkg] = ev.get("Elapsed", 0)
                          continue
                      if not test: continue
                      key = f"{pkg}/{test}"
                      if key not in tests:
                          tests[key] = {"name": test, "package": pkg, "status": "", "duration_s": 0, "output": [], "error": ""}
                      t = tests[key]
                      if action == "output": t["output"].append(ev.get("Output", ""))
                      elif action == "pass":
                          t["status"] = "passed"
                          t["duration_s"] = ev.get("Elapsed", 0)
                      elif action == "fail":
                          t["status"] = "failed"
                          t["duration_s"] = ev.get("Elapsed", 0)
                          t["error"] = "".join(t["output"])[-3000:]
                      elif action == "skip": t["status"] = "skipped"
          except Exception as e:
              print(f"Warning: {e}", file=sys.stderr)
          packages = {}
          for key, t in tests.items():
              if not t["status"]: continue
              pkg = t["package"]
              if pkg not in packages: packages[pkg] = []
              packages[pkg].append(t)
          result = {"packages": {}, "pkg_durations": pkg_durations}
          for pkg, cases in packages.items():
              result["packages"][pkg] = [{"name": c["name"], "status": c["status"], "duration_seconds": c["duration_s"], "error_message": c["error"]} for c in cases]
          with open("verdox-test-results.json", "w") as f:
              json.dump(result, f)
          total = sum(len(v) for v in result["packages"].values())
          print(f"Verdox: parsed {total} tests across {len(result['packages'])} packages")
          VERDOX_PARSER
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-ce-results
          path: verdox-test-results.json

  # ──────────────────────────────────────────────
  # 3. Race Detection Tests
  # ──────────────────────────────────────────────
  go-test-race:
    name: Race Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run race tests
        run: |
          set +e
          # Exclude heavy packages (same as consul's go-tests.yml)
          PKGS=$(go list ./... | grep -E -v '^github.com/hashicorp/consul/agent(/consul|/local|/routine-leak-checker)?$' | grep -E -v '^github.com/hashicorp/consul(/command|/connect|/snapshot)')
          go test -json -race -gcflags=all=-d=checkptr=0 -count=1 -timeout 30m $PKGS 2>&1 | tee test-output.json
          exit 0
      - name: Parse test results
        if: always()
        run: |
          python3 << 'VERDOX_PARSER'
          import json, sys
          tests = {}
          pkg_durations = {}
          try:
              with open("test-output.json", "r") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      try: ev = json.loads(line)
                      except: continue
                      test = ev.get("Test", "")
                      pkg = ev.get("Package", "")
                      action = ev.get("Action", "")
                      if not test and pkg and action in ("pass", "fail"):
                          pkg_durations[pkg] = ev.get("Elapsed", 0)
                          continue
                      if not test: continue
                      key = f"{pkg}/{test}"
                      if key not in tests:
                          tests[key] = {"name": test, "package": pkg, "status": "", "duration_s": 0, "output": [], "error": ""}
                      t = tests[key]
                      if action == "output": t["output"].append(ev.get("Output", ""))
                      elif action == "pass":
                          t["status"] = "passed"
                          t["duration_s"] = ev.get("Elapsed", 0)
                      elif action == "fail":
                          t["status"] = "failed"
                          t["duration_s"] = ev.get("Elapsed", 0)
                          t["error"] = "".join(t["output"])[-3000:]
                      elif action == "skip": t["status"] = "skipped"
          except Exception as e:
              print(f"Warning: {e}", file=sys.stderr)
          packages = {}
          for key, t in tests.items():
              if not t["status"]: continue
              pkg = t["package"]
              if pkg not in packages: packages[pkg] = []
              packages[pkg].append(t)
          result = {"packages": {}, "pkg_durations": pkg_durations}
          for pkg, cases in packages.items():
              result["packages"][pkg] = [{"name": c["name"], "status": c["status"], "duration_seconds": c["duration_s"], "error_message": c["error"]} for c in cases]
          with open("verdox-test-results.json", "w") as f:
              json.dump(result, f)
          total = sum(len(v) for v in result["packages"].values())
          print(f"Verdox: parsed {total} tests across {len(result['packages'])} packages")
          VERDOX_PARSER
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-race-results
          path: verdox-test-results.json

  # ──────────────────────────────────────────────
  # 4. API Module Tests
  # ──────────────────────────────────────────────
  go-test-api:
    name: API Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
