# ────────────────────────────────────────────
# Upstream definitions
# ────────────────────────────────────────────
upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8080;
    keepalive 32;
}

# ────────────────────────────────────────────
# HTTP -> HTTPS redirect (production)
# ────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Health check endpoint (used by Docker healthcheck)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ────────────────────────────────────────────
# HTTPS server block
# ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;

    # ── SSL Configuration ──────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security Headers ──────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://avatars.githubusercontent.com data:; connect-src 'self' https://api.github.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request size limit ────────────────
    client_max_body_size 10m;

    # ── Proxy timeouts ────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ── Common proxy headers ──────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # ── Health check ──────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── AI Import (long-running OpenAI call) ─
    location /api/v1/repositories/ {
        limit_req zone=api burst=5 nodelay;

        proxy_pass http://backend_upstream/v1/repositories/;
        proxy_http_version 1.1;

        # AI import can take up to 3 minutes
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # ── Backend API (/api/) ───────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;

        # Strip /api prefix: /api/v1/users -> /v1/users
        rewrite ^/api/(.*) /$1 break;
    }

    # ── Auth endpoints (stricter rate limit)
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://backend_upstream/v1/auth/;
        proxy_http_version 1.1;
    }

    # ── Webhooks (/webhooks/) ─────────────
    location /webhooks/ {
        proxy_pass http://backend_upstream/webhooks/;
        proxy_http_version 1.1;

        # Webhooks may have larger payloads
        client_max_body_size 25m;
    }

    # ── SSE support for real-time events
    location /api/v1/sse/ {
        proxy_pass http://backend_upstream/v1/sse/;
        proxy_http_version 1.1;

        # Disable buffering for SSE
        proxy_buffering off;
        proxy_cache off;

        # Long timeouts for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # SSE-specific headers
        add_header X-Accel-Buffering no;
    }

    # ── WebSocket support for log streaming
    location /api/v1/runs/ {
        proxy_pass http://backend_upstream/v1/runs/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeout for streaming connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend (catch-all) ──────────────
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
    }

    # ── Static asset caching ──────────────
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;

        # Cache static assets aggressively (Next.js hashes filenames)
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }
}
