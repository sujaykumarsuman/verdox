# ────────────────────────────────────────────
# Upstream definitions
# ────────────────────────────────────────────
upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream backend_upstream {
    server backend:8080;
    keepalive 32;
}

# ────────────────────────────────────────────
# HTTP-only dev server (no rate limiting, no SSL)
# ────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # ── Health check ──────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Auth endpoints ────────────────────
    location /api/v1/auth/ {
        proxy_pass http://backend_upstream/v1/auth/;
        proxy_http_version 1.1;
    }

    # ── Backend API (/api/) ───────────────
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_http_version 1.1;

        rewrite ^/api/(.*) /$1 break;

        # Generate Suite AI call can take up to 10 minutes
        # The per-request timeout is enforced by the backend's context deadline;
        # nginx just needs to not kill the connection before that.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Webhooks ──────────────────────────
    location /webhooks/ {
        proxy_pass http://backend_upstream/webhooks/;
        proxy_http_version 1.1;
        client_max_body_size 25m;
    }

    # ── WebSocket support for log streaming
    location /api/v1/runs/ {
        proxy_pass http://backend_upstream/v1/runs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Static asset caching ──────────────
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
    }

    # ── Frontend (catch-all) ──────────────
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
    }
}
