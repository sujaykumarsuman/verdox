services:
  # ──────────────────────────────────────────────
  # Nginx -- expose both ports, use dev SSL certs
  # ──────────────────────────────────────────────
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl/dev:/etc/nginx/ssl:ro

  # ──────────────────────────────────────────────
  # Frontend -- Next.js dev server with fast refresh
  # ──────────────────────────────────────────────
  frontend:
    build: !reset null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # Backend -- air for Go hot reload
  # ──────────────────────────────────────────────
  backend:
    build: !reset null
    image: golang:1.26-alpine
    working_dir: /app
    command: sh -c "go install github.com/air-verse/air@latest && air -c .air.toml"
    volumes:
      - ./backend:/app
      - gomodcache:/go/pkg/mod
    env_file:
      - .env.dev
    environment:
      - APP_ENV=development
    ports:
      - "8080:8080"
      - "2345:2345"    # Delve debugger
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # PostgreSQL -- expose port for local tools
  # ──────────────────────────────────────────────
  postgres:
    ports:
      - "5432:5432"

  # ──────────────────────────────────────────────
  # Redis -- expose port for local tools
  # ──────────────────────────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ──────────────────────────────────────────────
  # Runner -- mount socket, expose for debugging
  # ──────────────────────────────────────────────
  runner:
    environment:
      - RUNNER_MAX_CONCURRENT=2
      - RUNNER_MAX_TIMEOUT=600

volumes:
  pgdata:
  redisdata:
  frontend_node_modules:
  gomodcache:
