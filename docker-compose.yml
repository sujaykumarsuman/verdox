services:
  # ──────────────────────────────────────────────
  # Reverse Proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: verdox-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - verdox-network

  # ──────────────────────────────────────────────
  # Frontend (Next.js 15)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: verdox-frontend
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost/api}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - verdox-network

  # ──────────────────────────────────────────────
  # Backend (Go / Echo v4)
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: verdox-backend
    expose:
      - "8080"
    env_file:
      - .env
    volumes:
      - repodata:/var/lib/verdox/repositories
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - verdox-network

  # ──────────────────────────────────────────────
  # PostgreSQL 17
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: verdox-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-verdox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-verdox}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-verdox} -d ${POSTGRES_DB:-verdox}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - verdox-network

  # ──────────────────────────────────────────────
  # Redis 7
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: verdox-redis
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - verdox-network

  # ───────────────────────────────────────��──────
  # Test Runner (Docker-in-Docker)
  # ──────────────────────────────────────────────
  runner:
    build:
      context: .
      dockerfile: docker/runner.Dockerfile
    container_name: verdox-runner
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - repodata:/var/lib/verdox/repositories:ro
    environment:
      - RUNNER_MAX_CONCURRENT=${RUNNER_MAX_CONCURRENT:-5}
      - RUNNER_MAX_TIMEOUT=${RUNNER_MAX_TIMEOUT:-1800}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DATABASE_URL=${DATABASE_URL:-postgres://verdox:changeme@postgres:5432/verdox?sslmode=disable}
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - verdox-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  repodata:
    driver: local

networks:
  verdox-network:
    driver: bridge
